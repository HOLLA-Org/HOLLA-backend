name: Deploy to VPS

on:
  push:
    branches: [production]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy using SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: 22
          script: |
            cd /var/www/HOLLA-backend

            git fetch origin
            git checkout production
            git pull origin production

            docker build -t holla-be .
            docker stop holla-be || true
            docker rm holla-be || true

            docker run -d \
              --name holla-be \
              -p 8000:8080 \
              --env-file .env \
              holla-be