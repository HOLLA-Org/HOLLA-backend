services:
  mongodb:
    image: mongo:5.0.15
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: 123456
    ports:
      - "27000:27017"
    volumes:
      - mongodb_data_container:/data/db

  redis:
    image: redis:7.2
    ports:
      - "6300:6379"
    volumes:
      - redis_data_container:/data

  backend:
    build: .
    ports:
      - "8000:8080"
    env_file:
      - .env
    environment:
      - MONGODB_URI=mongodb://root:123456@mongodb:27017/holla?authSource=admin
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - mongodb
      - redis

volumes:
  mongodb_data_container:
  redis_data_container:

